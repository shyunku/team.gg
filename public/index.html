<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      id="viewport"
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <script>
      if (/Mobi|Android/i.test(navigator.userAgent)) {
        document
          .getElementById("viewport")
          .setAttribute("content", "width=device-width, initial-scale=0.8");
        console.log("mobile detected");
      }
    </script>

    <title>team.gg</title>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap");
      @import url("https://fonts.googleapis.com/css2?family=Orbit&display=swap");
    </style>

    <link rel="icon" type="image/png" href="/favicon.ico" />
    <link rel="stylesheet" href="/global.css" />
    <script>
      const isDevelopmentHost = ["localhost", "127.0.0.1", "::1"].includes(window.location.hostname);
      const buildTarget = isDevelopmentHost ? "dev" : "production";
      window.TEAMGG_BUILD_TARGET = buildTarget;
      document.write(`<link rel="stylesheet" href="/build/${buildTarget}/bundle.css" />`);
      document.write(`<script defer src="/build/${buildTarget}/bundle.js"><\/script>`);
    </script>
  </head>

  <body></body>
</html>
